<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>飲み会 予算管理</title>
<meta name="description" content="飲み会・BBQなどのイベント予算を管理するアプリ">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ===== SIDEBAR ===== -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="app-icon">🍻</div>
    <div class="app-title">飲み会管理</div>
  </div>

  <div class="sidebar-section-label">イベント</div>
  <div id="eventList" class="event-list"></div>

  <button class="new-event-btn" id="btnNewEvent">
    <span class="new-event-icon">+</span>
    新しいイベント
  </button>

  <div class="sidebar-divider"></div>

  <div class="sidebar-section-label">設定</div>
  <button class="sidebar-nav-btn" id="btnNavMembers">
    <span class="sidebar-nav-icon">👥</span>
    メンバー管理
    <span class="sidebar-nav-badge" id="memberCountBadge"></span>
  </button>

  <div class="sidebar-footer">
    <button class="sidebar-action" id="btnExport">📤 バックアップ</button>
    <label class="sidebar-action" for="importFile">📥 復元</label>
    <input type="file" id="importFile" accept=".json" style="display:none">
  </div>
</aside>

<!-- ===== MAIN ===== -->
<div class="layout">
  <!-- モバイルヘッダー -->
  <header class="mobile-header">
    <button class="menu-btn" id="btnMenu">☰</button>
    <span class="mobile-title">飲み会管理</span>
    <div style="width:36px"></div>
  </header>

  <main class="content" id="content">
    <!-- 空状態 -->
    <div id="emptyState" class="empty-state">
      <div class="empty-icon">🍻</div>
      <h1 class="empty-title">飲み会管理</h1>
      <p class="empty-desc">イベントを作成して、集金・支出を管理しましょう。</p>
      <button class="btn-primary" id="btnNewEventEmpty">新しいイベントを作成</button>
    </div>

    <!-- イベント詳細 -->
    <div id="eventDetail" class="hidden">

      <!-- タイトルバー -->
      <div class="detail-titlebar">
        <div>
          <h1 class="detail-title" id="detailTitle">イベント名</h1>
          <div class="detail-subtitle" id="detailSubtitle">日付</div>
        </div>
        <button class="btn-destructive-sm" id="btnDeleteEvent">削除</button>
      </div>

      <!-- サマリーカード -->
      <div class="summary-grid">
        <div class="summary-card" id="cardCarry">
          <div class="summary-icon">↩️</div>
          <div class="summary-amount" id="sumCarry">¥0</div>
          <div class="summary-label">前回繰越</div>
        </div>
        <div class="summary-card" id="cardCollected">
          <div class="summary-icon">💰</div>
          <div class="summary-amount green" id="sumCollected">¥0</div>
          <div class="summary-label">集金合計</div>
        </div>
        <div class="summary-card" id="cardSpent">
          <div class="summary-icon">💸</div>
          <div class="summary-amount red" id="sumSpent">¥0</div>
          <div class="summary-label">支出合計</div>
        </div>
        <div class="summary-card balance-card" id="cardBalance">
          <div class="summary-icon">🏦</div>
          <div class="summary-amount" id="sumBalance">¥0</div>
          <div class="summary-label">残高</div>
        </div>
      </div>

      <!-- 一人当たり予算バー -->
      <div class="per-person-bar" id="perPersonBar">
        <div class="per-person-left">
          <span class="per-person-icon">👤</span>
          <div>
            <div class="per-person-label">一人当たり予算</div>
            <div class="per-person-sub" id="perPersonSub">参加者 0人</div>
          </div>
        </div>
        <div class="per-person-amount" id="perPersonAmount">¥0</div>
      </div>

      <!-- お店を探す -->

      <!-- イベント設定 -->
      <div class="card">
        <div class="card-header">
          <div class="card-title">イベント設定</div>
        </div>
        <div class="field-grid">
          <div class="field">
            <label class="field-label">イベント名</label>
            <input type="text" id="eventName" class="field-input" placeholder="例: 4月飲み会">
          </div>
          <div class="field">
            <label class="field-label">日付</label>
            <input type="date" id="eventDate" class="field-input">
          </div>
          <div class="field">
            <label class="field-label">前回繰越 (¥)</label>
            <input type="number" id="eventCarry" class="field-input" placeholder="0" min="0">
          </div>
          <div class="field">
            <label class="field-label">メモ</label>
            <input type="text" id="eventNote" class="field-input" placeholder="備考など">
          </div>
        </div>
        <div class="card-footer">
          <button class="btn-primary" id="btnSaveEvent">保存</button>
        </div>
      </div>

      <!-- 支出 -->
      <div class="card">
        <div class="card-header">
          <div class="card-title">支出</div>
          <button class="btn-icon-circle" id="btnAddExpense" title="支出を追加">+</button>
        </div>
        <div id="expenseList"></div>
      </div>

      <!-- 参加者・集金 -->
      <div class="card">
        <div class="card-header">
          <div class="card-title">参加者・集金</div>
          <button class="btn-icon-circle" id="btnAddMember" title="メンバーを追加">+</button>
        </div>
        <div id="memberList"></div>
      </div>

    </div>

    <!-- ===== メンバー管理ページ ===== -->
    <div id="membersPage" class="hidden">
      <div class="detail-titlebar">
        <div>
          <h1 class="detail-title">メンバー管理</h1>
          <div class="detail-subtitle">登録したメンバーは新しいイベントに自動で追加されます</div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-title">メンバーを追加</div>
        </div>
        <div style="padding: 16px 20px; border-bottom: 1px solid var(--border);">
          <div class="input-row">
            <input type="text" id="globalMemberName" class="field-input"
              style="border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;background:var(--bg);"
              placeholder="名前を入力（例: 田中 太郎）">
            <button class="btn-primary" id="btnAddGlobalMember">追加</button>
          </div>
        </div>
        <div id="globalMemberList"></div>
      </div>
    </div>

  </main>
</div>

<!-- ===== モーダル: 新規イベント ===== -->
<div id="modalNewEvent" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title">新しいイベント</h2>
    </div>
    <div class="modal-body">
      <div class="field">
        <label class="field-label">イベント名 <span class="required">必須</span></label>
        <input type="text" id="newEventName" class="field-input" placeholder="例: 6月飲み会" autofocus>
      </div>
      <div class="field">
        <label class="field-label">日付</label>
        <input type="date" id="newEventDate" class="field-input">
      </div>
      <div class="field">
        <label class="field-label">前回繰越 (¥)</label>
        <input type="number" id="newEventCarry" class="field-input" placeholder="0" min="0">
      </div>
      <div class="field" id="carryFromPrevField" style="display:none">
        <label class="field-label" style="display:flex;align-items:center;gap:8px">
          <input type="checkbox" id="carryFromPrev" class="checkbox">
          前回イベントの残高を自動で繰越
        </label>
        <div class="field-hint" id="carryFromPrevHint"></div>
      </div>
      <div class="field">
        <label class="field-label" style="display:flex;align-items:center;gap:8px">
          <input type="checkbox" id="newEventAutoAdd" class="checkbox" checked>
          登録済みメンバーを自動追加
        </label>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" id="btnCancelNewEvent">キャンセル</button>
      <button class="btn-primary" id="btnCreateEvent">作成</button>
    </div>
  </div>
</div>

<!-- ===== モーダル: 支出追加/編集 ===== -->
<div id="modalExpense" class="modal-overlay hidden">
  <div class="modal modal-sm">
    <div class="modal-header">
      <h2 class="modal-title" id="expenseModalTitle">支出を追加</h2>
    </div>
    <div class="modal-body">
      <div class="field">
        <label class="field-label">内容 <span class="required">必須</span></label>
        <input type="text" id="expenseDesc" class="field-input" placeholder="例: お店代">
      </div>
      <div class="field">
        <label class="field-label">金額 (¥) <span class="required">必須</span></label>
        <input type="number" id="expenseAmount" class="field-input" placeholder="0" min="0">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" id="btnCancelExpense">キャンセル</button>
      <button class="btn-primary" id="btnSaveExpense">保存</button>
    </div>
  </div>
</div>

<!-- ===== モーダル: メンバー追加 ===== -->
<div id="modalMember" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title">メンバーを追加</h2>
    </div>
    <div class="modal-body">
      <div class="field">
        <label class="field-label">新しいメンバー</label>
        <div class="input-row">
          <input type="text" id="newMemberName" class="field-input" placeholder="名前を入力">
          <button class="btn-primary" id="btnRegisterMember">追加</button>
        </div>
      </div>
      <div id="knownMembersSection" style="display:none">
        <div class="divider-label">登録済みメンバー</div>
        <div id="knownMemberList" class="chip-list"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-primary" id="btnCancelMember">完了</button>
    </div>
  </div>
</div>

<!-- ===== モーダル: 削除確認 ===== -->
<div id="modalConfirm" class="modal-overlay hidden">
  <div class="modal modal-sm">
    <div class="modal-header">
      <h2 class="modal-title" id="confirmTitle">削除しますか？</h2>
    </div>
    <div class="modal-body">
      <p id="confirmMessage" style="color:var(--text-secondary);font-size:0.9rem"></p>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" id="btnConfirmCancel">キャンセル</button>
      <button class="btn-primary" id="btnConfirmOk" style="background:var(--red)">削除する</button>
    </div>
  </div>
</div>

<!-- ===== モーダル: 名前編集 ===== -->
<div id="modalEditMember" class="modal-overlay hidden">
  <div class="modal modal-sm">
    <div class="modal-header">
      <h2 class="modal-title">名前を編集</h2>
    </div>
    <div class="modal-body">
      <div class="field">
        <label class="field-label">名前 <span class="required">必須</span></label>
        <input type="text" id="editMemberName" class="field-input"
          style="border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;background:var(--bg);">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" id="btnCancelEditMember">キャンセル</button>
      <button class="btn-primary" id="btnSaveEditMember">保存</button>
    </div>
  </div>
</div>

<!-- サイドバーオーバーレイ（モバイル） -->
<div class="sidebar-overlay hidden" id="sidebarOverlay"></div>

<script src="app.js"></script>
</body>
</html>
